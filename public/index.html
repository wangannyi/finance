<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A 股投资决策台</title>
    <meta name="description" content="本地私有 A 股投资研究工作台，跟踪今日主线、候选标的、估值和风险纪律。" />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#mainContent">跳到主要内容</a>
    <header class="topbar">
      <div>
        <p class="eyebrow">Private Market Workbench</p>
        <h1>A 股投资决策台</h1>
      </div>
      <div class="market-status-bar" id="marketStatusBar" aria-label="市场状态">
        <span class="market-status-chip">A 股 等待数据</span>
      </div>
      <div class="actions">
        <span id="status" class="status">仅读取本地数据</span>
        <span id="globalUpdated" class="status">等待刷新</span>
        <span id="dataHealth" class="health-pill">数据源待检</span>
        <button id="refreshBtn" type="button">立即更新</button>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar" aria-label="工作台导航">
        <nav class="side-nav">
          <a class="nav-item active" href="#todayPanel">今日决策</a>
          <a class="nav-item" href="#candidatePanel">候选短名单</a>
          <a class="nav-item" href="#reports">主线证据</a>
          <a class="nav-item" href="#historyPanel">更新记录</a>
        </nav>
        <section class="sidebar-note" aria-label="风险纪律">
          <strong>A 股纪律</strong>
          <span>只做看得懂的主线；没有公告、业绩和成交验证，不因为热度扩大仓位。</span>
        </section>
      </aside>

      <main id="mainContent" class="workbench-main">
        <section id="todayPanel" class="insight-panel">
          <div class="section-head">
            <h2>今日决策面板</h2>
            <span id="insightUpdated">等待数据</span>
          </div>
          <div id="decisionSummary" class="decision-summary"></div>
        </section>

        <section id="candidatePanel" class="candidate-panel">
          <div class="section-head">
            <h2>A 股候选短名单</h2>
            <div class="section-actions">
              <span id="candidateLimit">按风险护栏生成</span>
              <button id="candidateToggle" class="ghost-button" type="button" aria-expanded="false" aria-controls="candidatePool">
                展开
              </button>
            </div>
          </div>
          <div id="candidatePool" class="candidate-pool"></div>
        </section>

        <section id="reports" class="reports" aria-label="主题详情"></section>

        <section id="historyPanel" class="history-wrap">
          <div class="section-head">
            <h2>A 股滚动更新记录</h2>
            <span>最近 30 条</span>
          </div>
          <div id="history" class="ticker"></div>
        </section>
      </main>
    </div>

    <div id="companyOverlay" class="company-overlay" hidden>
      <aside class="company-panel" role="dialog" aria-modal="true" aria-labelledby="companyTitle" aria-live="polite">
        <div class="company-panel-head">
          <div>
            <p class="eyebrow">Company Detail</p>
            <h2 id="companyTitle">公司详情</h2>
          </div>
          <button id="closeCompanyPanel" type="button" aria-label="关闭">关闭</button>
        </div>
        <div id="companyBody" class="company-body"></div>
      </aside>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
